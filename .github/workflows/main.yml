name: Build Pro App (Ultimate Stable Fix)
on: [push]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Move Files
        run: |
          unzip project.zip -d temp_folder
          ROOT_DIR=$(find temp_folder -name "assets" -exec dirname {} \;)
          cp -R $ROOT_DIR/* .
          cp temp_folder/icon.png . || find temp_folder -name "icon.png" -exec cp {} . \;
          rm -rf temp_folder

      - name: Create Pro Main.dart
        run: |
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'dart:io' show Platform, File, Directory;
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:webview_flutter/webview_flutter.dart';
          import 'package:permission_handler/permission_handler.dart';
          import 'package:webview_flutter_android/webview_flutter_android.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MaterialApp(debugShowCheckedModeBanner: false, home: WebViewPage()));
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            late final WebViewController controller;

            @override
            void initState() {
              super.initState();
              _initController();
            }

            void _initController() {
              controller = WebViewController()
                ..setJavaScriptMode(JavaScriptMode.unrestricted)
                ..enableZoom(true) // מפעיל זום והקטנה/הגדלה עם האצבעות
                ..addJavaScriptChannel(
                  'BlobDownloader',
                  onMessageReceived: (JavaScriptMessage message) async {
                    try {
                      final data = jsonDecode(message.message);
                      final String base64Data = data['base64'];
                      final String fileName = data['name'] ?? 'recording.wav';
                      final bytes = base64Decode(base64Data);
                      
                      final directory = Directory('/storage/emulated/0/Download');
                      if (!await directory.exists()) {
                        await directory.create(recursive: true);
                      }
                      final file = File('\${directory.path}/\${fileName}');
                      await file.writeAsBytes(bytes);
                      
                      if (mounted) {
                        ScaffoldMessenger.of(context).showSnackBar(
                          SnackBar(content: Text('הקובץ נשמר בהצלחה בתיקיית ההורדות: \${fileName}')),
                        );
                      }
                    } catch (e) {
                      if (mounted) {
                        ScaffoldMessenger.of(context).showSnackBar(
                          const SnackBar(content: Text('שגיאה בשמירת הקובץ')),
                        );
                      }
                    }
                  },
                )
                ..setNavigationDelegate(NavigationDelegate(
                  onPageFinished: (url) async {
                    if (Platform.isAndroid) { 
                      await [Permission.microphone, Permission.camera, Permission.storage, Permission.manageExternalStorage].request(); 
                    }
                    // הזרקת קוד שמתרגם הורדות Blob ל-Base64 ומעביר לאנדרואיד
                    controller.runJavaScript('''
                      (function() {
                        const originalCreateObjectURL = window.URL.createObjectURL;
                        window.URL.createObjectURL = function(blob) {
                          const url = originalCreateObjectURL(blob);
                          if (blob && (blob.type.includes('audio') || blob.type.includes('octet-stream'))) {
                            const reader = new FileReader();
                            reader.onloadend = function() {
                              const base64 = reader.result.split(',')[1];
                              BlobDownloader.postMessage(JSON.stringify({base64: base64, name: 'organ_recording.wav'}));
                            };
                            reader.readAsDataURL(blob);
                          }
                          return url;
                        };
                      })();
                    ''');
                  },
                ))
                ..loadFlutterAsset('assets/index.html');

              if (controller.platform is AndroidWebViewController) {
                final androidController = controller.platform as AndroidWebViewController;
                androidController.setGeolocationEnabled(true);
                androidController.setMediaPlaybackRequiresUserGesture(false); // הפחתת דיליי סאונד
              }
            }

            @override
            Widget build(BuildContext context) => Scaffold(body: SafeArea(child: WebViewWidget(controller: controller)));
          }
          EOF

      - name: Fix Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: app_console
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            webview_flutter: ^4.10.0
            webview_flutter_android: ^4.12.0
            permission_handler: ^11.3.1
          dev_dependencies:
            flutter_launcher_icons: ^0.13.1
          flutter_icons:
            android: true
            image_path: "icon.png"
            adaptive_icon_background: "#FFFFFF"
            adaptive_icon_foreground: "icon.png"
          flutter:
            uses-material-design: true
            assets:
              - assets/
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Android Project
        run: |
          rm -rf android
          flutter create . --platforms android --org com.kids.browser --project-name app_console
          sed -i 's/android:label="app_console"/android:label="הקונסולה של האפליקציות"/' android/app/src/main/AndroidManifest.xml
          
          # האצת חומרה, זיכרון גדול (Large Heap) והגדרות חסינות דריסה
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:largeHeap="true" android:requestLegacyExternalStorage="true"/' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Clean and Generate Icons
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons || true

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: console-app-fixed
          path: build/app/outputs/flutter-apk/*.apk

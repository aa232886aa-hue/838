name: Build Pro App (Ultimate Performance Fix)
on: [push]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Unzip and Move Files
        run: |
          unzip project.zip -d temp_folder
          ROOT_DIR=$(find temp_folder -name "assets" -exec dirname {} \;)
          cp -R $ROOT_DIR/* .
          cp temp_folder/icon.png . || find temp_folder -name "icon.png" -exec cp {} . \;
          rm -rf temp_folder

      - name: Create Pro Main.dart
        run: |
          mkdir -p lib
          cat <<EOF > lib/main.dart
          import 'dart:io' show Platform, File, Directory;
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:flutter_inappwebview/flutter_inappwebview.dart';
          import 'package:permission_handler/permission_handler.dart';

          void main() async {
            WidgetsFlutterBinding.ensureInitialized();
            runApp(const MaterialApp(debugShowCheckedModeBanner: false, home: WebViewPage()));
          }

          class WebViewPage extends StatefulWidget {
            const WebViewPage({super.key});
            @override State<WebViewPage> createState() => _WebViewPageState();
          }

          class _WebViewPageState extends State<WebViewPage> {
            InAppWebViewController? webViewController;
            String htmlContent = "<h1>Loading...</h1>";

            @override
            void initState() {
              super.initState();
              _loadHtmlAsset();
            }

            // קריאת קובץ ה-HTML המקומי והכנתו לטעינה מאובטחת
            void _loadHtmlAsset() async {
              try {
                String content = await DefaultAssetBundle.of(context).loadString('assets/index.html');
                setState(() {
                  htmlContent = content;
                });
              } catch (_) {}
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                body: SafeArea(
                  child: InAppWebView(
                    // טעינת הקוד כתוכן מקומי מאובטח (עוקף את חסימות file:// ומאפשר גלילה וזום)
                    initialData: InAppWebViewInitialData(
                      data: htmlContent,
                      mimeType: "text/html",
                      encoding: "utf8",
                      baseUrl: WebUri("http://localhost:8080/"),
                    ),
                    initialSettings: InAppWebViewSettings(
                      javaScriptEnabled: true,
                      useWideViewPort: true, // תמיכה בגלילה אופקית רחבה של האורגן
                      loadWithOverviewMode: true, // התאמת האתר למסך
                      supportZoom: true, // הפעלת הגדלה והקטנה (זום בצביטה)
                      builtInZoomControls: true,
                      displayZoomControls: false,
                      allowFileAccessFromFileURLs: true,
                      allowUniversalAccessFromFileURLs: true,
                      mediaPlaybackRequiresUserGesture: false, // שיפור משמעותי של הדיליי בסאונד
                    ),
                    onWebViewCreated: (controller) {
                      webViewController = controller;
                    },
                    onLoadStop: (controller, url) async {
                      if (Platform.isAndroid) {
                        await [Permission.microphone, Permission.camera, Permission.storage, Permission.manageExternalStorage].request();
                      }
                    },
                    // 📂 מנגנון תפיסת קבצי ה-Blob של האורגן ושמירתם למכשיר
                    onDownloadStartRequest: (controller, downloadStartRequest) async {
                      try {
                        final String url = downloadStartRequest.url.toString();
                        final String fileName = downloadStartRequest.suggestedFilename ?? 'recording.wav';
                        final directory = Directory('/storage/emulated/0/Download');
                        
                        if (!await directory.exists()) {
                          await directory.create(recursive: true);
                        }
                        
                        if (url.startsWith('data:')) {
                          final encodedData = url.split(',')[1];
                          final bytes = base64Decode(encodedData);
                          final file = File('\${directory.path}/\${fileName}');
                          await file.writeAsBytes(bytes);
                          
                          ScaffoldMessenger.of(context).showSnackBar(
                            SnackBar(content: Text('הקובץ נשמר בתיקיית ההורדות: \${fileName}')),
                          );
                        }
                      } catch (e) {
                        ScaffoldMessenger.of(context).showSnackBar(
                          const SnackBar(content: Text('שגיאה בשמירת קובץ ההקלטה')),
                        );
                      }
                    },
                  ),
                ),
              );
            }
          }
          EOF

      - name: Fix Pubspec
        run: |
          cat <<EOF > pubspec.yaml
          name: organ_app_pro
          version: 1.0.0+1
          environment:
            sdk: ">=3.0.0 <4.0.0"
          dependencies:
            flutter:
              sdk: flutter
            flutter_inappwebview: ^6.0.0 # שימוש בגרסה יציבה ומותאמת לראנר
            permission_handler: ^11.3.1
          dev_dependencies:
            flutter_launcher_icons: ^0.13.1
          flutter_icons:
            android: true
            image_path: "icon.png"
            adaptive_icon_background: "#FFFFFF"
            adaptive_icon_foreground: "icon.png"
          flutter:
            uses-material-design: true
            assets:
              - assets/
          EOF

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Recreate Android Project
        run: |
          rm -rf android
          flutter create . --platforms android --org com.organ.pro --project-name organ_app_pro
          
          # החלפת השם העברי
          sed -i 's/android:label="organ_app_pro"/android:label="הקונסולה של האפליקציות"/' android/app/src/main/AndroidManifest.xml
          
          # פתיחת הגדרות זיכרון (Large Heap), האצת חומרה והרשאות קבצים
          sed -i 's/<application/<application android:usesCleartextTraffic="true" android:hardwareAccelerated="true" android:largeHeap="true" android:requestLegacyExternalStorage="true"/' android/app/src/main/AndroidManifest.xml
          sed -i '/<application/i \    <uses-permission android:name="android.permission.INTERNET"/>\n    <uses-permission android:name="android.permission.CAMERA"/>\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Force Compatible Gradle Version
        run: |
          # 🛠️ הזרקת פקודה שמאלצת את מערכת הבנייה להתעלם משגיאת ה-Proguard הישנה
          echo "android.defaults.buildfeatures.buildconfig=true" >> android/gradle.properties
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle.kts || sed -i 's/minSdkVersion .*/minSdkVersion 24/' android/app/build.gradle

      - name: Clean and Generate Icons
        run: |
          flutter pub get
          flutter pub run flutter_launcher_icons || true

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: organ-app-fixed-final
          path: build/app/outputs/flutter-apk/*.apk
